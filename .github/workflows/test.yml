name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Scientific reference: one exact Python and dependency graph, verified by hash.
  canonical-lock:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install canonical uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "0.11.7"
        enable-cache: true

    - name: Set up canonical Python
      run: uv python install 3.12.12

    - name: Verify lock hash
      run: shasum -a 256 -c uv.lock.sha256

    - name: Install exact workspace lock
      run: uv sync --locked --python 3.12.12 --all-packages --all-groups

    - name: Run canonical API guards
      env:
        QISKIT_IBM_TOKEN: ""
      run: uv run --locked --python 3.12.12 pytest tests/compat -q

  # Fast feedback: linting and type checking
  lint:
    runs-on: ubuntu-latest
    needs: canonical-lock
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "0.11.7"
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.12.12

    - name: Install dependencies
      run: uv sync --locked --python 3.12.12 --all-packages --all-groups

    - name: Run ruff linting
      run: |
        cd qiskit-docs-mcp-server && uv run ruff check src tests
        cd ../qiskit-ibm-runtime-mcp-server && uv run ruff check src tests
        cd ../qiskit-ibm-transpiler-mcp-server && uv run ruff check src tests
        cd ../qiskit-mcp-server && uv run ruff check src tests
        cd ../qiskit-gym-mcp-server && uv run ruff check src tests

    - name: Run ruff formatting check
      run: |
        cd qiskit-docs-mcp-server && uv run ruff format --check src tests
        cd ../qiskit-ibm-runtime-mcp-server && uv run ruff format --check src tests
        cd ../qiskit-ibm-transpiler-mcp-server && uv run ruff format --check src tests
        cd ../qiskit-mcp-server && uv run ruff format --check src tests
        cd ../qiskit-gym-mcp-server && uv run ruff format --check src tests

    - name: Run type checking
      run: |
        cd qiskit-docs-mcp-server && uv run mypy --config-file ../mypy.ini src
        cd ../qiskit-ibm-runtime-mcp-server && uv run mypy --config-file ../mypy.ini src
        cd ../qiskit-ibm-transpiler-mcp-server && uv run mypy --config-file ../mypy.ini src
        cd ../qiskit-mcp-server && uv run mypy --config-file ../mypy.ini src
        cd ../qiskit-gym-mcp-server && uv run mypy --config-file ../mypy.ini src

    - name: Run security checks
      run: |
        cd qiskit-docs-mcp-server && uv run bandit -c pyproject.toml -r src
        cd ../qiskit-ibm-runtime-mcp-server && uv run bandit -c pyproject.toml -r src
        cd ../qiskit-ibm-transpiler-mcp-server && uv run bandit -c pyproject.toml -r src
        cd ../qiskit-mcp-server && uv run bandit -c pyproject.toml -r src
        cd ../qiskit-gym-mcp-server && uv run bandit -c pyproject.toml -r src

  test-runtime:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "0.11.7"
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install publishable Runtime compatibility environment
      run: |
        uv venv --python ${{ matrix.python-version }} .venv-matrix
        uv pip install --no-config --python .venv-matrix/bin/python \
          -e './qiskit-mcp-server[test]' \
          -e './qiskit-ibm-runtime-mcp-server[test]'

    - name: Run tests for Runtime server
      run: |
        env -u QISKIT_IBM_TOKEN .venv-matrix/bin/python -m pytest \
          qiskit-ibm-runtime-mcp-server/tests/ -v \
          --cov=qiskit-ibm-runtime-mcp-server/src \
          --cov-report=xml:qiskit-ibm-runtime-mcp-server/coverage.xml \
          --cov-report=term-missing

    - name: Upload coverage for Runtime server
      uses: codecov/codecov-action@v3
      with:
        file: ./qiskit-ibm-runtime-mcp-server/coverage.xml
        flags: runtime
        name: runtime-coverage

  test-transpiler:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "0.11.7"
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install publishable Transpiler compatibility environment
      run: |
        uv venv --python ${{ matrix.python-version }} .venv-matrix
        uv pip install --no-config --python .venv-matrix/bin/python \
          -e './qiskit-mcp-server[test]' \
          -e './qiskit-ibm-transpiler-mcp-server[test]'

    - name: Run tests for Transpiler server
      run: |
        env -u QISKIT_IBM_TOKEN .venv-matrix/bin/python -m pytest \
          qiskit-ibm-transpiler-mcp-server/tests/ -m 'not integration' -v \
          --cov=qiskit-ibm-transpiler-mcp-server/src \
          --cov-report=xml:qiskit-ibm-transpiler-mcp-server/coverage.xml \
          --cov-report=term-missing

    - name: Upload coverage for Transpiler server
      uses: codecov/codecov-action@v3
      with:
        file: ./qiskit-ibm-transpiler-mcp-server/coverage.xml
        flags: transpiler
        name: transpiler-coverage

  test-qiskit:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "0.11.7"
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install publishable Qiskit compatibility environment
      run: |
        uv venv --python ${{ matrix.python-version }} .venv-matrix
        uv pip install --no-config --python .venv-matrix/bin/python \
          -e './qiskit-mcp-server[test]'

    - name: Run tests for Qiskit server
      run: |
        .venv-matrix/bin/python -m pytest qiskit-mcp-server/tests/ -v \
          --cov=qiskit-mcp-server/src \
          --cov-report=xml:qiskit-mcp-server/coverage.xml \
          --cov-report=term-missing

    - name: Upload coverage for Qiskit server
      uses: codecov/codecov-action@v3
      with:
        file: ./qiskit-mcp-server/coverage.xml
        flags: qiskit
        name: qiskit-coverage

  test-docs:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "0.11.7"
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install publishable Docs compatibility environment
      run: |
        uv venv --python ${{ matrix.python-version }} .venv-matrix
        uv pip install --no-config --python .venv-matrix/bin/python \
          -e ./qiskit-docs-mcp-server \
          'pytest>=7.4' 'pytest-asyncio>=0.21' 'pytest-cov>=4.1' 'pytest-mock>=3.11'

    - name: Run tests for Docs server
      run: |
        .venv-matrix/bin/python -m pytest qiskit-docs-mcp-server/tests/ \
          -m 'not integration' -v \
          --cov=qiskit-docs-mcp-server/src \
          --cov-report=xml:qiskit-docs-mcp-server/coverage.xml \
          --cov-report=term-missing

    - name: Upload coverage for Docs server
      uses: codecov/codecov-action@v3
      with:
        file: ./qiskit-docs-mcp-server/coverage.xml
        flags: docs
        name: docs-coverage

  test-gym:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "0.11.7"
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install publishable Gym compatibility environment
      run: |
        uv venv --python ${{ matrix.python-version }} .venv-matrix
        uv pip install --no-config --python .venv-matrix/bin/python \
          -e './qiskit-mcp-server[test]' \
          -e './qiskit-gym-mcp-server[test]'

    - name: Run tests for Gym server
      run: |
        .venv-matrix/bin/python -m pytest qiskit-gym-mcp-server/tests/ -v \
          --cov=qiskit-gym-mcp-server/src \
          --cov-report=xml:qiskit-gym-mcp-server/coverage.xml \
          --cov-report=term-missing

    - name: Upload coverage for Gym server
      uses: codecov/codecov-action@v3
      with:
        file: ./qiskit-gym-mcp-server/coverage.xml
        flags: gym
        name: gym-coverage
